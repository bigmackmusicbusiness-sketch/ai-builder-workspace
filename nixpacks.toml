# nixpacks.toml — Railway build config for the pnpm monorepo.
# Only the API service is deployed; worker + web go to Cloudflare.

[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = ["npm install -g pnpm@9 && pnpm install --frozen-lockfile"]

[phases.build]
cmds = ["pnpm --filter @abw/api build"]

[start]
cmd = "node apps/api/dist/server.js"
