# nixpacks.toml — Railway build config for the pnpm monorepo.
# Only the API service is deployed; worker + web go to Cloudflare.

[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
# corepack is bundled with Node 20 and reads packageManager from package.json
cmds = ["corepack enable && pnpm install --frozen-lockfile"]

[phases.build]
cmds = ["pnpm --filter @abw/api build"]

[start]
cmd = "node apps/api/dist/server.js"
