# apps/web/nginx.coolify.conf — minimal SPA config for the Vite-built static site.
# Single-file SPA → try_files falls back to /index.html so client-side routing works.
# Long cache for hashed assets (Vite emits content-hashed filenames). No cache for
# the index itself so deploys land immediately.
#
# Iframe-embedding policy:
# - Default for nginx is NO X-Frame-Options + NO CSP frame-ancestors, which
#   means any origin can iframe the SPA. That's a click-jacking risk and
#   bad practice.
# - SPS round 8 Feature A: SPS portals (admin + customer) iframe the IDE
#   inside their own UI. To support that without leaving the SPA open to
#   arbitrary embedders, set CSP frame-ancestors with an explicit allow-list:
#     - 'self' (the SPA's own origin — needed for preview tab + sub-frames)
#     - https://app.signalpointportal.com (SPS internal Service Center)
#     - https://client.signalpointportal.com (SPS customer portal)
#   The X-Frame-Options DENY default is OMITTED here on purpose — that header
#   has no allow-list mode in modern browsers and would block legitimate
#   iframing. frame-ancestors is the correct modern equivalent (both Chrome
#   and Firefox prefer it when both headers are present).

server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Security headers applied to every response. frame-ancestors is the
  # important one for round-8 Feature A; the others are belt-and-suspenders
  # since helmet on the API can't reach the static SPA.
  add_header Content-Security-Policy "frame-ancestors 'self' https://app.signalpointportal.com https://client.signalpointportal.com" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

  # Hashed assets — cache hard
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    add_header Content-Security-Policy "frame-ancestors 'self' https://app.signalpointportal.com https://client.signalpointportal.com" always;
    try_files $uri =404;
  }

  # Index — never cache
  location = /index.html {
    add_header Cache-Control "no-store, no-cache, must-revalidate";
    add_header Pragma "no-cache";
    add_header Content-Security-Policy "frame-ancestors 'self' https://app.signalpointportal.com https://client.signalpointportal.com" always;
  }

  # SPA fallback — anything else falls through to index.html so client-side
  # routes (TanStack Router) get a chance to match.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Healthcheck endpoint Coolify can hit
  location = /healthz {
    access_log off;
    add_header Content-Type text/plain;
    return 200 'ok';
  }

  # Hide nginx version in headers
  server_tokens off;
}
